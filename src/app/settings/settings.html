<section class="mx-auto w-full max-w-4xl px-4 py-8 sm:px-6 sm:py-10">
  <header class="mb-6">
    <h1 class="m-0 text-[var(--somara-fs-4)] leading-tight">Einstellungen</h1>
    <p class="m-0 mt-2 text-[var(--somara-fs-0)] settings-subtitle">
      Passe das Erscheinungsbild deiner App an.
    </p>
  </header>

  <section
    class="settings-theme-card rounded-3xl border p-5 sm:p-6">
    <h2 class="m-0 text-[var(--somara-fs-2)] leading-tight">Theme</h2>
    <p class="m-0 mt-2 text-[var(--somara-fs-0)] settings-card-subtitle">
      Wähle zwischen System, Light und Dark Mode.
    </p>

    <div class="mt-5 grid grid-cols-1 gap-3 sm:grid-cols-3">
      @for (option of themeOptions; track option.value) {
        <button
          type="button"
          class="theme-option flex min-h-[4.4rem] flex-col items-start gap-1 rounded-xl border px-4 py-3 text-left transition-all duration-150 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2"
          [class.theme-option--active]="activeThemeMode() === option.value"
          (click)="setThemeMode(option.value)">
          <span class="font-semibold">{{ option.label }}</span>
          <span class="text-[var(--somara-fs--1)] opacity-85">
            {{ activeThemeMode() === option.value ? 'Aktiv' : 'Auswählen' }}
          </span>
        </button>
      }
    </div>
  </section>
</section>
