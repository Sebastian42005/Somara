<div class="rounded-full secondary-border w-14 h-14 flex items-center justify-center cursor-pointer">
  @if (profileImageUrl()) {
    <img
      class="h-full w-full rounded-full object-cover"
      [src]="profileImageUrl()"
      [alt]="(teacher()?.name ?? username()) + ' Profilbild'"
      (error)="onProfileImageError()" />
  } @else {
    <h2 class="secondary-color font-bold">{{ initials() }}</h2>
  }
</div>
