<div
  class="card-clickable"
  [ngStyle]="{ 'background-color': entry().color + '99'}">
  <span class="font-bold">{{ entry().name }}</span>
  <div class="flex flex-row items-center gap-2">
    @if (entry().teacher.profileImage) {
      <img
        class="h-5 w-5 rounded-full border border-[var(--somara-secondary)] object-cover"
        [src]="entry().teacher.profileImage"
        [alt]="entry().teacher.name + ' Profilbild'" />
    } @else {
      <mat-icon>person</mat-icon>
    }
    <span>{{ entry().teacher.name }}</span>
  </div>
  <div class="flex flex-row items-center gap-2">
    <mat-icon>hourglass_bottom</mat-icon>
    <span>{{ getDurationInMinutes(entry().start, entry().end) }} Min</span>
  </div>
  <div class="flex flex-row items-center gap-2">
    <mat-icon>schedule</mat-icon>
    <span>{{ entry().start | time }} - {{ entry().end | time }}</span>
  </div>
</div>
