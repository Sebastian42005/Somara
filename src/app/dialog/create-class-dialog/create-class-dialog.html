<mat-dialog-content>
  <h5 class="mb-1">Neue Klasse erstellen</h5>

  <form
    id="create-class-form"
    class="create-class-form"
    [formGroup]="classForm"
    (ngSubmit)="submit()">
    <label class="flex flex-col gap-1.5" for="class-name">
      <span class="text-sm font-medium text-[var(--somara-text)]">Name</span>
      <input
        id="class-name"
        class="input-base"
        type="text"
        formControlName="name"
        autocomplete="off"/>
    </label>

    <label class="flex flex-col gap-1.5" for="class-description">
      <span class="text-sm font-medium text-[var(--somara-text)]">Beschreibung</span>
      <textarea
        id="class-description"
        class="class-description-input input-base"
        formControlName="description"
        rows="4"></textarea>
    </label>

    <label class="flex flex-col gap-1.5" for="class-color">
      <span class="text-sm font-medium text-[var(--somara-text)]">Farbe</span>
      <div class="color-input-row">
        <input
          id="class-color"
          class="input-base w-40"
          formControlName="color"
          autocomplete="off"/>
        <input
          #nativeColorPicker
          class="native-color-picker"
          type="color"
          [value]="classForm.controls.color.value"
          (input)="onColorPickerChange(nativeColorPicker.value)"
          aria-label="Farbe mit Color Picker auswählen" />
      </div>
    </label>

    <div class="class-image-section">
      <div class="class-image-actions">
        <button
          type="button"
          class="class-image-trigger"
          [disabled]="isBusy()"
          (click)="classImageInput.click()"
          aria-label="Klassenbild auswählen">
          @if (classImagePreview()) {
            <img
              class="class-image-preview"
              [src]="classImagePreview()"
              alt="Klassenbild Vorschau" />
          } @else {
            <div class="class-image-placeholder">Kein Bild ausgewählt</div>
          }
        </button>

        @if (classImagePreview()) {
          <button
            type="button"
            class="class-image-delete"
            [disabled]="isBusy()"
            (click)="clearClassImage(classImageInput)"
            aria-label="Klassenbild entfernen">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </div>

      <input
        #classImageInput
        id="class-image"
        class="hidden-file-input"
        type="file"
        accept="image/*"
        [disabled]="isBusy()"
        (change)="onClassImageSelected($event)" />
    </div>
  </form>

  @if (errorMessage()) {
    <p class="mt-3 text-sm text-red-700">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end" class="mt-3 flex gap-2">
  <button
    type="button"
    class="button-base button-stroked min-w-32"
    [disabled]="isBusy()"
    (click)="close()">
    Abbrechen
  </button>

  <button
    type="submit"
    class="button-base button-raised min-w-52"
    [disabled]="isBusy()"
    form="create-class-form">
    Klasse erstellen
  </button>
</mat-dialog-actions>
