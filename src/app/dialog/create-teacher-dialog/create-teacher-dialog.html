<mat-dialog-content>
  <h5 class="mb-1">Neuen Lehrer erstellen</h5>

  <form
    id="create-teacher-form"
    class="create-teacher-form"
    [formGroup]="teacherForm"
    (ngSubmit)="submit()">
    <label class="flex flex-col gap-1.5" for="teacher-name">
      <span class="text-sm font-medium text-[var(--somara-text)]">Name</span>
      <input
        id="teacher-name"
        class="rounded-lg border-2 border-[var(--somara-secondary)] bg-[var(--somara-background)] px-3 py-2 text-[var(--somara-text)] outline-none transition focus:border-[var(--somara-secondary)] focus:ring-4 focus:ring-black/10"
        type="text"
        formControlName="name"
        autocomplete="off"/>
    </label>

    <label class="flex flex-col gap-1.5" for="teacher-description">
      <span class="text-sm font-medium text-[var(--somara-text)]">Beschreibung</span>
      <textarea
        id="teacher-description"
        class="teacher-description-input rounded-lg border-2 border-[var(--somara-secondary)] bg-[var(--somara-background)] px-3 py-2 text-[var(--somara-text)] outline-none transition focus:border-[var(--somara-secondary)] focus:ring-4 focus:ring-black/10"
        formControlName="description"
        rows="4"></textarea>
    </label>

    <div class="profile-image-section">
      <span class="text-sm font-medium text-[var(--somara-text)]">Profilbild</span>

      <div class="profile-image-actions">
        <button
          type="button"
          class="profile-image-trigger"
          [disabled]="isBusy()"
          (click)="profileImageInput.click()"
          aria-label="Profilbild auswählen">
          @if (profileImagePreview()) {
            <img
              class="profile-preview"
              [src]="profileImagePreview()"
              alt="Profilbild Vorschau" />
          } @else {
            <div class="profile-placeholder">Kein Profilbild ausgewählt</div>
          }
        </button>

        @if (profileImagePreview()) {
          <button
            type="button"
            class="profile-image-delete"
            [disabled]="isBusy()"
            (click)="clearProfileImage(profileImageInput)"
            aria-label="Profilbild entfernen">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </div>

      @if (selectedProfileImageName()) {
        <p class="text-sm text-[var(--somara-text)]/85">Ausgewählte Datei: {{ selectedProfileImageName() }}</p>
      }

      <input
        #profileImageInput
        id="teacher-profile-image"
        class="hidden-file-input"
        type="file"
        accept="image/*"
        [disabled]="isBusy()"
        (change)="onProfileImageSelected($event)" />

      <p class="text-xs text-[var(--somara-text)]/80">Erlaubte Formate: Bilder, maximal 4 MB.</p>
    </div>
  </form>

  @if (errorMessage()) {
    <p class="mt-3 text-sm text-red-700">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end" class="mt-3 flex gap-2">
  <button
    type="button"
    class="button-base button-stroked min-w-32"
    [disabled]="isBusy()"
    (click)="close()">
    Abbrechen
  </button>

  <button
    type="submit"
    class="button-base button-raised min-w-52"
    [disabled]="isBusy()"
    form="create-teacher-form">
    Lehrer erstellen
  </button>
</mat-dialog-actions>
